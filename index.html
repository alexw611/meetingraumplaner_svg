lor:#88857e;font-size:10px;letter-spacing:.08em;text-transform:uppercase;text-align:center}
    .summary-grid,.form-grid{display:grid;gap:10px}.summary-grid{grid-template-columns:repeat(2,minmax(0,1fr));margin-bottom:10px}.form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.summary-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}.summary-card h4{margin:0 0 8px;font-size:.92rem;font-weight:500;color:var(--muted)}.summary-card p,.summary-card ul{margin:0;padding-left:0;list-style-position:inside;line-height:1.6;color:var(--text)}.field{display:grid;gap:8px}.field.full{grid-column:1 / -1}label{font-size:.9rem;color:#2f2f2c}.required{color:#cf2f2f}input,textarea{width:100%;min-height:48px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);outline:none;transition:border-color .18s ease, box-shadow .18s ease}textarea{min-height:110px;resize:vertical}input:focus,textarea:focus{border-color:rgba(0,157,223,.4);box-shadow:0 0 0 3px rgba(0,157,223,.10)}.check{display:flex;gap:10px;align-items:flex-start;padding:14px;border-radius:12px;border:1px solid var(--line);background:#fff}.check input{width:18px;min-height:18px;margin-top:2px;box-shadow:none}

  <script>
    const SUMMARY_KEY='summary';
    const state={currentStep:0,maxVisitedStep:0,answers:{roomSize:'',budget:'',display:'',doorSign:'',mounting:'',ceilingMic:'',requirements:[],roomConditions:[],manufacturer:'no_preference',contact:{name:'',company:'',email:'',phone:'',message:'',privacy:false}}};
    const optionLabelMap={roomSize:{huddle:'Huddle (1–4 Personen)',medium:'Medium (5–8 Personen)',large:'Large (9–16 Personen)',custom_project:'17+ / Sonderprojekt'},budget:{under_5000:'Unter 5.000 €',between_5000_15000:'5.000 € – 15.000 €',over_15000:'Über 15.000 €'},display:{single:'Single Display',dual:'Dual Display',touch:'Touch Display'},doorSign:{yes:'Ja',no:'Nein'},mounting:{wall:'Wandmontage',free:'Freistehend'},ceilingMic:{yes:'Ja',no:'Nein',unsure:'Nicht sicher'},requirements:{wide_angle:'Weitwinkelkamera',ptz:'PTZ Kamera',speaker_tracking:'Speaker Tracking',auto_framing:'Auto Framing',byod:'BYOD Nutzung',content_sharing:'Content Sharing'},roomConditions:{glass:'Viel Glas',poor_acoustics:'Schlechte Akustik',acoustic_panels:'Akustikpaneele vorhanden',acoustic_measurement:'Akustik-Messung',high_ceilings:'Hohe Decken',sunlight:'Sonneneinstrahlung'},manufacturer:{lenovo:'Lenovo',yealink:'Yealink',crestron:'Crestron',logitech:'Logitech',poly:'Poly',neat:'Neat',no_preference:'Egal / Beratung erwünscht'}};
    const steps=[
      {key:'roomSize',navLabel:'Raumgröße',type:'single',title:'Wie viele Personen nutzen den Raum?',subtitle:'Für größere Projekte wie LED Wall, Video Wall, Hörsaal oder Veranstaltungsraum wählen Sie bitte 17+ / Sonderprojekt.',note:()=>state.answers.roomSize==='custom_project'?'17+ / Sonderprojekt ist für größere AV-Projekte gedacht. Über Weiter gelangen Sie direkt zur Anfrage.':'',options:[{value:'huddle',title:'Huddle',desc:'1–4 Pers.',tag:'Klein'},{value:'medium',title:'Medium',desc:'5–8 Pers.',tag:'Standard'},{value:'large',title:'Large',desc:'9–16 Pers.',tag:'Groß'},{value:'custom_project',title:'17+ / Sonderprojekt',desc:'LED Wall, Video Wall, Hörsaal, Veranstaltungsraum',tag:'Abklärung',special:true}]},
      {key:'budget',navLabel:'Budget',type:'single',title:'Welches Budget ist geplant?',subtitle:'',helper:()=>['large','custom_project'].includes(state.answers.roomSize)?'Unter 5.000 € ist hier deaktiviert.':'',options:[{value:'under_5000',title:'Unter 5.000 €',desc:'Einstiegslösung',tag:'Budget',disabled:()=>['large','custom_project'].includes(state.answers.roomSize)},{value:'between_5000_15000',title:'5.000 € – 15.000 €',desc:'Standardlösung',tag:'Standard'},{value:'over_15000',title:'Über 15.000 €',desc:'Premium-Setup',tag:'Premium'}]},
      {key:'display',navLabel:'Display',type:'single',title:'Welche Display-Lösung wird benötigt?',subtitle:'',helper:()=>state.answers.roomSize==='huddle'?'Dual Display ist für Huddle deaktiviert.':'',options:[{value:'single',title:'Single Display',desc:'Ein Display',tag:'Klassisch'},{value:'dual',title:'Dual Display',desc:'Zwei Displays',tag:'Erweitert',disabled:()=>state.answers.roomSize==='huddle'},{value:'touch',title:'Touch Display',desc:'Interaktiv',tag:'Touch'}]},
      {key:'manufacturer',navLabel:'Hersteller',type:'single',optional:true,title:'Hersteller-Präferenz?',subtitle:'',options:[{value:'lenovo',title:'Lenovo'},{value:'yealink',title:'Yealink'},{value:'crestron',title:'Crestron'},{value:'logitech',title:'Logitech'},{value:'poly',title:'Poly'},{value:'neat',title:'Neat'},{value:'no_preference',title:'Egal / Beratung erwünscht'}]},
      {key:'doorSign',navLabel:'Türschild',type:'single',title:'Türschild integrieren?',subtitle:'',options:[{value:'yes',title:'Ja',desc:'Mit Belegungsanzeige',tag:'Optional'},{value:'no',title:'Nein',desc:'Nicht erforderlich',tag:'Optional'}]},
      {key:'mounting',navLabel:'Montage',type:'single',title:'Welche Montage ist möglich?',subtitle:'',options:[{value:'wall',title:'Wandmontage',desc:'Fest installiert',tag:'Fix'},{value:'free',title:'Freistehend',desc:'Standfuß / Trolley',tag:'Flexibel'}]},
      {key:'ceilingMic',navLabel:'Mikrofon',type:'single',title:'Deckenmikrofon möglich?',subtitle:'',options:[{value:'yes',title:'Ja',desc:'Deckenmontage',tag:'Sicher'},{value:'no',title:'Nein',desc:'Alternative Lösung',tag:'Audio'},{value:'unsure',title:'Nicht sicher',desc:'Später klären',tag:'Offen'}]},
      {key:'requirements',navLabel:'Funktionen',type:'multi',optional:true,title:'Welche Funktionen sind wichtig?',subtitle:'',options:[{value:'wide_angle',title:'Weitwinkelkamera',desc:'Mehr Raum im Bild'},{value:'ptz',title:'PTZ Kamera',desc:'Schwenken, neigen, zoomen'},{value:'speaker_tracking',title:'Speaker Tracking',desc:'Fokus auf Sprecher'},{value:'auto_framing',title:'Auto Framing',desc:'Automatische Bildanpassung'},{value:'byod',title:'BYOD Nutzung',desc:'Eigene Geräte nutzen'},{value:'content_sharing',title:'Content Sharing',desc:'Inhalte teilen'}]},
      {key:'roomConditions',navLabel:'Besonderheiten',type:'multi',optional:true,title:'Welche Raumfaktoren sind relevant?',subtitle:'',options:[{value:'glass',title:'Viel Glas',desc:'Reflexionen beachten'},{value:'poor_acoustics',title:'Schlechte Akustik',desc:'Sprachverständlichkeit optimieren'},{value:'acoustic_panels',title:'Akustikpaneele vorhanden',desc:'Gute Voraussetzung'},{value:'acoustic_measurement',title:'Akustik-Messung',desc:'Beratung erwünscht'},{value:'high_ceilings',title:'Hohe Decken',desc:'Wichtig für Montage'},{value:'sunlight',title:'Sonneneinstrahlung',desc:'Display-Helligkeit beachten'}]},
      {key:SUMMARY_KEY,navLabel:'Kontakt',type:'summary',title:'Zusammenfassung',subtitle:'Angaben prüfen und Anfrage absenden.'}

    const els={progressLabel:document.getElementById('progressLabel'),progressBar:document.getElementById('progressBar'),stepNav:document.getElementById('stepNav'),stepTitle:document.getElementById('stepTitle'),stepSubtitle:document.getElementById('stepSubtitle'),noticeBox:document.getElementById('noticeBox'),content:document.getElementById('content'),footerNote:document.getElementById('footerNote'),nextBtn:document.getElementById('nextBtn'),backBtn:document.getElementById('backBtn'),roomPreview:document.getElementById('roomPreview'),previewLegend:document.getElementById('previewLegend')};
    function escapeHtml(v=''){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function summaryIndex(){return steps.findIndex(s=>s.key===SUMMARY_KEY)}function markVisited(i){state.maxVisitedStep=Math.max(state.maxVisitedStep,i)}function isCustomPath(){return state.answers.roomSize==='custom_project'}
    function isStepComplete(step){if(step.type==='summary')return true;if(step.optional)return true;const v=state.answers[step.key];if(step.type==='multi')return Array.isArray(v)&&v.length>0;return v!==''}
    function canContinue(){const step=steps[state.currentStep];if(step.type==='summary'){const c=state.answers.contact;return Boolean(c.name&&c.company&&c.email&&c.phone&&c.privacy)}return isStepComplete(step)}
    function getProgress(){const total=steps.length,current=state.currentStep+1;return{current,total,percent:Math.round((current/total)*100)}}
    function updateDependencies(changedKey,value){if(changedKey==='roomSize'){if(value==='huddle'&&state.answers.display==='dual')state.answers.display='';if(['large','custom_project'].includes(value)&&state.answers.budget==='under_5000')state.answers.budget=''}}
    function renderStepNav(){const summaryIdx=summaryIndex();const customPath=isCustomPath();els.stepNav.innerHTML=steps.map((step,i)=>{const current=i===state.currentStep;const canJump=customPath?(i===0||i===summaryIdx):i<=state.maxVisitedStep;const done=customPath?((i===0&&Boolean(state.answers.roomSize))||(i===summaryIdx&&state.currentStep===summaryIdx)):(i<state.currentStep||(i<steps.length-1&&isStepComplete(step)));return `<button type="button" class="step-chip ${current?'current':''} ${done?'done':''} ${canJump?'':'locked'}" data-step-index="${i}" ${canJump?'':'disabled'}>${escapeHtml(step.navLabel)}</button>`}).join('');els.stepNav.querySelectorAll('.step-chip').forEach(btn=>btn.addEventListener('click',()=>{const i=Number(btn.dataset.stepIndex);const canJump=customPath?(i===0||i===summaryIdx):i<=state.maxVisitedStep;if(Number.isInteger(i)&&canJump){state.currentStep=i;render()}}))}
    function cardRoomData(type){return {huddle:{floor:'M26 62 L80 24 L134 62 L80 98 Z',table:[80,61,24,10],display:[58,18,44,10],seats:[[80,38],[80,84],[48,61],[112,61]]},medium:{floor:'M18 62 L80 22 L142 62 L80 98 Z',table:[80,61,36,10],display:[52,16,56,10],seats:[[52,40],[80,36],[108,40],[42,61],[118,61],[52,82],[80,86],[108,82]]},large:{floor:'M14 64 L80 18 L146 64 L80 102 Z',table:[80,62,48,10],display:[50,14,60,10],seats:[[50,38],[72,34],[88,34],[110,38],[38,62],[122,62],[50,86],[72,90],[88,90],[110,86]]},custom_project:{floor:'M12 66 L80 16 L148 66 L80 104 Z',table:[80,64,50,9],display:[40,12,80,14],seats:[[48,40],[72,36],[88,36],[112,40],[36,64],[124,64],[48,88],[72,92],[88,92],[112,88]]}}[type]}

" r="2" fill="#6fd3ff"/><circle cx="207" cy="${cfg.tableTop.cy+6}" r="2" fill="#6fd3ff"/></g></g>`}const doorSignSvg=hasDoorSign?`<g filter="url(#shadowSoft)"><rect x="${cfg.door.x-26}" y="${cfg.door.y-10}" width="18" height="48" rx="6" fill="#f4f2ed" stroke="#dbd6cd"/><rect x="${cfg.door.x-1}" y="${cfg.door.y}" width="26" height="18" rx="6" fill="#fff" stroke="#e5e1d9"/><circle cx="${cfg.door.x+17}" cy="${cfg.door.y+9}" r="4" fill="#009DDF"/><rect x="${cfg.door.x+4}" y="${cfg.door.y+7}" width="7" height="3" rx="1.5" fill="#b8b4ad"/></g>`:'';const seats=cfg.seats.map(seat=>{const scale=seat.y>cfg.tableTop.cy?1.0:(seat.y<cfg.tableTop.cy?0.88:0.94);return renderSeat(seat.x,seat.y,scale)}).join('');return `<svg viewBox="0 0 400 260" aria-label="Live-Raumvorschau mit Raumtiefe"><defs><linearGradient id="backWall" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f2f1ed"/></linearGradient><linearGradient id="leftWall" x1="1" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#ece8e1"/><stop offset="100%" stop-color="#ddd8cf"/></linearGradient><linearGradient id="rightWall" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#edeae3"/><stop offset="100%" stop-color="#e2ddd5"/></linearGradient><linearGradient id="floorGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#ece9e2"/><stop offset="100%" stop-color="#ddd8cf"/></linearGradient><linearGradient id="tableTop" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#ece9e2"/></linearGradient><linearGradient id="tableBase" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#d9d4cc"/><stop offset="100%" stop-color="#bbb6ae"/></linearGradient><filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="rgba(25,25,25,.14)"/></filter></defs><rect x="0" y="0" width="400" height="260" fill="#faf9f6"/><rect x="${cfg.back.x}" y="${cfg.back.y}" width="${cfg.back.w}" height="${cfg.back.h}" rx="${cfg.back.r}" fill="url(#backWall)" stroke="#e3dfd7"/><polygon points="${cfg.leftWall.x1},${cfg.leftWall.y1} ${cfg.leftWall.x2},${cfg.leftWall.y2} ${cfg.leftWall.x3},${cfg.leftWall.y3} ${cfg.leftWall.x4},${cfg.leftWall.y4}" fill="url(#leftWall)" stroke="#ddd8cf"/><polygon points="${cfg.rightWall.x1},${cfg.rightWall.y1} ${cfg.rightWall.x2},${cfg.rightWall.y2} ${cfg.rightWall.x3},${cfg.rightWall.y3} ${cfg.rightWall.x4},${cfg.rightWall.y4}" fill="url(#rightWall)" stroke="#ddd8cf"/><polygon points="${cfg.floor.x1},${cfg.floor.y1} ${cfg.floor.x2},${cfg.floor.y2} ${cfg.floor.x3},${cfg.floor.y3} ${cfg.floor.x4},${cfg.floor.y4}" fill="url(#floorGrad)" stroke="#d7d2c9"/><path d="M${cfg.floor.x4} ${cfg.floor.y4} L${cfg.floor.x4+22} ${cfg.floor.y1+18} L${cfg.back.x} ${cfg.back.y+cfg.back.h} Z" fill="rgba(255,255,255,.14)" opacity=".45"/><path d="M${cfg.back.x+cfg.back.w} ${cfg.back.y+cfg.back.h} L${cfg.floor.x3} ${cfg.floor.y3} L${cfg.floor.x3-20} ${cfg.floor.y1+16} Z" fill="rgba(255,255,255,.08)" opacity=".5"/><path d="M${cfg.back.x+18} ${cfg.back.y+cfg.back.h-4} L${cfg.back.x+cfg.back.w-18} ${cfg.back.y+cfg.back.h-4}" stroke="rgba(0,157,223,.10)" stroke-width="4" stroke-linecap="round"/>${displaySvg}${mountSvg}${ptzSvg}${micSvg}${doorSignSvg}<g filter="url(#shadowSoft)"><ellipse cx="${cfg.tableTop.cx}" cy="${cfg.tableTop.cy+23}" rx="${cfg.tableTop.rx-8}" ry="12" fill="rgba(18,18,18,.08)"/><ellipse cx="${cfg.tableBase.cx}" cy="${cfg.tableBase.cy}" rx="${cfg.tableBase.rx}" ry="${cfg.tableBase.ry}" fill="url(#tableBase)" opacity=".92"/><ellipse cx="${cfg.tableTop.cx}" cy="${cfg.tableTop.cy}" rx="${cfg.tableTop.rx}" ry="${cfg.tableTop.ry}" fill="url(#tableTop)" stroke="#dcd7cf"/><ellipse cx="${cfg.tableTop.cx}" cy="${cfg.tableTop.cy-2}" rx="${cfg.tableTop.rx-15}" ry="${Math.max(9,cfg.tableTop.ry-5)}" fill="#fbfbf9" stroke="#efede7"/><ellipse cx="${cfg.tableTop.cx}" cy="${cfg.tableTop.cy-4}" rx="${cfg.tableTop.rx-34}" ry="3" fill="rgba(0,157,223,.12)"/></g>${seats}</svg>`}
    function buildPreviewLegend(a){const chips=[];const add=label=>chips.push(`<span class="preview-chip"><span class="preview-dot"></span>${escapeHtml(label)}</span>`);if(a.roomSize)add(optionLabelMap.roomSize[a.roomSize]);if(a.display)add(optionLabelMap.display[a.display]);if(a.doorSign==='yes')add('Türschild');if(a.mounting)add(optionLabelMap.mounting[a.mounting]);if(a.ceilingMic==='yes')add('Deckenmikrofon');else if(a.ceilingMic==='no')add('Soundbar');if(a.manufacturer&&a.manufacturer!=='no_preference')add(optionLabelMap.manufacturer[a.manufacturer]);els.previewLegend.innerHTML=chips.join('')}
    function renderPreview(){els.roomPreview.innerHTML=buildRoomPreviewSvg(state.answers);buildPreviewLegend(state.answers)}
    function render(){const step=steps[state.currentStep],progress=getProgress();els.progressLabel.textContent=`Schritt ${progress.current} von ${progress.total}`;els.progressBar.style.width=`${progress.percent}%`;els.stepTitle.textContent=step.title;els.stepSubtitle.textContent=step.subtitle||'';const note=typeof step.note==='function'?step.note():'';els.noticeBox.style.display=note?'block':'none';els.noticeBox.textContent=note;renderStepNav();if(step.type==='summary'){els.content.innerHTML=renderSummary();bindSummaryInputs();els.nextBtn.textContent='Anfrage absenden';els.footerNote.textContent=isCustomPath()?'Kontaktdaten eingeben.':'Pflichtfelder ausfüllen.'}else{els.content.innerHTML=renderCards(step);bindCardEvents(step);els.nextBtn.textContent='Weiter';if(step.key==='manufacturer')els.footerNote.textContent='';else if(step.optional&&step.type==='multi')els.footerNote.textContent='Optional';else els.footerNote.textContent=''}els.backBtn.disabled=state.currentStep===0;els.nextBtn.disabled=!canContinue();renderPreview()}
    document.getElementById('logoReloadBtn')?.addEventListener('click',()=>window.location.reload());
    els.backBtn.addEventListener('click',()=>{if(isCustomPath()&&state.currentStep===summaryIndex()){state.currentStep=0;render();return}if(state.currentStep>0){state.currentStep-=1;markVisited(state.currentStep);render()}});
    els.nextBtn.addEventListener('click',async()=>{if(!canContinue())return;const step=steps[state.currentStep];if(step.type!=='summary'){if(step.key==='roomSize'&&state.answers.roomSize==='custom_project'){const target=summaryIndex();state.currentStep=target;markVisited(target);render();return}state.currentStep+=1;markVisited(state.currentStep);render();return}els.nextBtn.disabled=true;els.nextBtn.textContent='Wird gesendet ...';try{const result=await apiService.submitLead(getPayload());if(result.ok){const success=document.getElementById('successBox');if(success)success.style.display='block';els.footerNote.textContent='Demo erfolgreich abgeschlossen.';els.nextBtn.textContent='Erfolgreich gesendet'}else{els.nextBtn.textContent='Erneut versuchen';els.nextBtn.disabled=false}}catch(err){console.error(err);els.footerNote.textContent='Fehler beim Senden.';els.nextBtn.textContent='Erneut versuchen';els.nextBtn.disabled=false}});
    render();
